<section id="apply" appScrollReveal class="py-32">
    <div class="max-w-7xl mx-auto px-8 -mt-35">
        <div
            class="bg-gradient-to-br from-blue-700 to-blue-500 rounded-[2.5rem] p-20 text-center text-white overflow-hidden relative shadow-2xl shadow-blue-200/50">
            <div class="relative z-10 max-w-3xl mx-auto">
                <h2 class="text-5xl md:text-6xl font-extrabold mb-8 tracking-tight">Begin Your Legacy.</h2>
                <p class="text-xl text-blue-100/80 mb-12 leading-relaxed font-medium">

                </p>
                <div class="flex flex-col sm:flex-row justify-center gap-5">

                        <path d="M 10 0 L 0 0 0 10" fill="none" stroke="currentColor" stroke-width="0.5" />
                    </pattern>
                    <rect width="100" height="100" fill="url(#grid-pattern)" />
