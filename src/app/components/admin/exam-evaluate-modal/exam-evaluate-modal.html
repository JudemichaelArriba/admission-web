<div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-blue-900/40 backdrop-blur-xl transition-opacity duration-300" (click)="close.emit()"></div>

  <div class="relative w-full max-w-sm bg-white/90 backdrop-blur-2xl rounded-[2.5rem] shadow-2xl shadow-blue-900/20 border border-white/50 overflow-hidden animate-in zoom-in-95 duration-200">
    
   

    <div class="px-6 py-5 md:px-8 md:py-6 border-b border-slate-100/80 flex items-center justify-between bg-white/50">
      <div class="flex items-center gap-4 overflow-hidden">
        <div class="w-11 h-11 rounded-2xl bg-blue-600 flex items-center justify-center shadow-xl shadow-blue-200 shrink-0">
          <span class="material-symbols-outlined text-white text-[22px]">grading</span>
        </div>
        <div class="overflow-hidden">
          <h2 class="text-lg font-black text-slate-900 tracking-tight leading-none truncate">Evaluate <span class="text-blue-600">Exam</span></h2>
          <div class="flex items-center gap-1.5 mt-2">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest bg-slate-100 px-1.5 py-0.5 rounded">Ref: {{ exam.id }}</span>
          </div>
        </div>
      </div>
      <button (click)="close.emit()" [disabled]="isSubmitting()" class="shrink-0 w-9 h-9 flex items-center justify-center rounded-xl bg-slate-50 border border-slate-100 text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all active:scale-90 disabled:opacity-50">
        <span class="material-symbols-outlined text-[20px]">close</span>
      </button>
    </div>

    <div class="p-6 md:p-8">
      
      <div class="mb-6 p-4 rounded-2xl bg-white border border-slate-100 shadow-sm flex items-center gap-4 group transition-all hover:border-blue-100">
        <div class="w-12 h-12 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center shrink-0 group-hover:bg-blue-50 transition-colors">
          <span class="material-symbols-outlined text-slate-400 group-hover:text-blue-500 text-[24px]">person</span>
        </div>
        <div class="overflow-hidden">
          <h3 class="text-sm font-black text-slate-800 truncate leading-tight">{{ exam.applicant?.first_name }} {{ exam.applicant?.last_name }}</h3>
          <p class="text-[10px] font-bold text-blue-500 uppercase tracking-wider truncate mt-1">{{ exam.applicant?.course?.course_name }}</p>
        </div>
      </div>

      <div class="space-y-3">
        <label class="flex items-center gap-2 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1">
          <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
          Final Exam Score
        </label>
        <div class="relative group">
          <input 
            type="number" 
            [ngModel]="score()" 
            (ngModelChange)="score.set($event)"
            [disabled]="isSubmitting()"
            min="0" max="100" step="0.01"
            placeholder="0.00"
            class="w-full px-5 py-4 pr-20 bg-white border-2 border-slate-100 rounded-[1.25rem] text-3xl font-black text-slate-800 placeholder:text-slate-200 focus:border-blue-500 focus:ring-8 focus:ring-blue-500/5 outline-none transition-all shadow-sm disabled:bg-slate-50 disabled:text-slate-400">
          <div class="absolute right-5 top-1/2 -translate-y-1/2 flex items-center gap-1">
             <span class="h-6 w-px bg-slate-200 mr-2"></span>
             <span class="text-slate-400 font-black text-sm uppercase tracking-tighter">/ 100</span>
          </div>
        </div>
      </div>

    </div>

    <div class="px-6 py-5 md:px-8 md:py-6 border-t border-slate-100 bg-slate-50/80 backdrop-blur-md flex flex-col sm:flex-row gap-3">
      <button (click)="close.emit()" [disabled]="isSubmitting()" class="flex-1 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-500 bg-white border border-slate-200 hover:bg-slate-100 transition-all active:scale-95 disabled:opacity-50">
        Discard
      </button>
      <button (click)="onSubmit()" [disabled]="isSubmitting()" class="flex-[2] py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest text-white bg-blue-600 hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all flex items-center justify-center gap-2 active:scale-95 disabled:opacity-70 disabled:cursor-wait">
        @if (isSubmitting()) {
          <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          Synchronizing...
        } @else {
          <span class="material-symbols-outlined text-[18px]">verified_user</span>
          {{ exam.exam_score === null ? 'Submit Grade' : 'Update Record' }}
        }
      </button>
    </div>

  </div>
</div>
