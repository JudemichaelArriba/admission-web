<div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" (click)="close.emit()"></div>

  <div class="relative w-full max-w-sm bg-white rounded-[2rem] shadow-2xl border border-slate-100 overflow-hidden animate-in zoom-in-95 duration-200">
    
    <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-md shadow-blue-200 shrink-0">
          <span class="material-symbols-outlined text-white text-[20px]">grading</span>
        </div>
        <div>
          <h2 class="text-base font-extrabold text-slate-900 tracking-tight leading-tight">Evaluate Exam</h2>
          <p class="text-[10px] font-bold text-slate-400 mt-0.5 tracking-widest uppercase">ID: {{ exam.id }}</p>
        </div>
      </div>
      <button (click)="close.emit()" [disabled]="isSubmitting()" class="w-8 h-8 flex items-center justify-center rounded-xl bg-white border border-slate-200 text-slate-400 hover:bg-slate-50 hover:text-slate-700 transition-colors disabled:opacity-50">
        <span class="material-symbols-outlined text-[18px]">close</span>
      </button>
    </div>

    <div class="p-8">
      
      <div class="mb-6 p-4 rounded-2xl bg-slate-50 border border-slate-100 flex items-center gap-4">
        <div class="w-12 h-12 rounded-full bg-white border border-slate-200 flex items-center justify-center shrink-0">
          <span class="material-symbols-outlined text-slate-400 text-[24px]">person</span>
        </div>
        <div class="overflow-hidden">
          <h3 class="text-sm font-black text-slate-800 truncate">{{ exam.applicant?.first_name }} {{ exam.applicant?.last_name }}</h3>
          <p class="text-[11px] font-medium text-slate-500 truncate mt-0.5">{{ exam.applicant?.course?.course_name }}</p>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest pl-1">Final Exam Score</label>
        <div class="relative">
          <input 
            type="number" 
            [ngModel]="score()" 
            (ngModelChange)="score.set($event)"
            [disabled]="isSubmitting()"
            min="0" max="100" step="0.01"
            placeholder="0.00"
            class="w-full px-5 py-4 bg-white border-2 border-slate-200 rounded-2xl text-2xl font-black text-slate-800 placeholder:text-slate-300 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all disabled:bg-slate-50 disabled:text-slate-500">
          <span class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">/ 100</span>
        </div>
      </div>

    </div>

    <div class="px-8 py-5 border-t border-slate-100 bg-slate-50/50 flex gap-3">
      <button (click)="close.emit()" [disabled]="isSubmitting()" class="flex-1 py-3.5 rounded-xl text-[11px] font-black uppercase tracking-wider text-slate-500 bg-white border border-slate-200 hover:bg-slate-50 transition-colors disabled:opacity-50">
        Cancel
      </button>
      <button (click)="onSubmit()" [disabled]="isSubmitting()" class="flex-[2] py-3.5 rounded-xl text-[11px] font-black uppercase tracking-wider text-white bg-blue-600 hover:bg-blue-700 shadow-md shadow-blue-200 transition-all flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-wait">
        @if (isSubmitting()) {
          <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          Saving...
        } @else {
          <span class="material-symbols-outlined text-[16px]">save</span>
          {{ exam.exam_score === null ? 'Submit Grade' : 'Update Grade' }}
        }
      </button>
    </div>

  </div>
</div>
