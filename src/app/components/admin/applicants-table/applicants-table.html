<div class="overflow-x-auto">
  <table class="w-full text-left border-collapse">
    <thead>
      <tr class="bg-slate-50/50 border-b border-slate-100">
        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[.15em] text-slate-400 w-32">ID</th>
        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[.15em] text-slate-400">Applicant Name</th>
        <th class="px-6 py-5 text-[10px] font-black uppercase tracking-[.15em] text-slate-400">Target Course</th>
        <th class="px-6 py-5 text-[10px] font-black uppercase tracking-[.15em] text-slate-400 w-32 text-center">Status</th>
        <th class="px-6 py-5 text-[10px] font-black uppercase tracking-[.15em] text-slate-400 w-40">Submission</th>
        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[.15em] text-slate-400 text-right">Actions</th>
      </tr>
    </thead>

    <tbody class="divide-y divide-slate-50">
      @for (app of data; track app.id) {
        <tr
          app-applicants-row
          [applicant]="app"
          (approveClicked)="approveClicked.emit($event)"
          (rejectClicked)="rejectClicked.emit($event)"
          class="hover:bg-blue-50/30 transition-all group">
        </tr>
      } @empty {
        <tr>
          <td colspan="6" class="px-8 py-32 text-center">
            <div class="flex flex-col items-center justify-center gap-3">
              <span class="material-symbols-outlined text-slate-200 text-5xl">person_search</span>
              <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">No applicants found matching your criteria</p>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
