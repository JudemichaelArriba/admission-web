<td class="px-5 py-4 text-sm font-medium text-slate-600">{{ applicant.id }}</td>
<td class="px-5 py-4 text-sm text-slate-600">{{ applicant.email }}</td>
<td class="px-5 py-4 text-sm font-bold text-blue-950">
    {{ applicant.first_name }} {{ applicant.last_name }}
</td>
<td class="px-5 py-4 text-sm text-slate-600">
    {{ applicant.course?.course_name || 'N/A' }}
</td>
<td class="px-5 py-4 text-center">
    <span [ngClass]="{
        'bg-amber-50 text-amber-600 border-amber-100': applicant.status === 'pending',
        'bg-emerald-50 text-emerald-600 border-emerald-100': applicant.status === 'approved',
        'bg-rose-50 text-rose-600 border-rose-100': applicant.status === 'rejected',
        'bg-blue-50 text-blue-600 border-blue-100': applicant.status === 'enrolled'
    }" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider border">
        {{ applicant.status || 'pending' }}
    </span>
</td>
