<div class="overflow-x-auto bg-white rounded-[2rem] border border-slate-200 shadow-sm">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-50 border-b-2 border-blue-600">
                <th class="px-5 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">No.</th>
                <th class="px-5 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">Email Address</th>
                <th class="px-5 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">Applicant Name</th>
                <th class="px-5 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">Course Applied</th>
                <th class="px-5 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest text-center">
                    Application Status
                </th>
            </tr>
        </thead>
        <tbody>
            <tr *ngIf="isLoading">
                <td colspan="5" class="py-12 text-center text-slate-500 text-sm font-medium">
                    Loading your application status...
                </td>
            </tr>

            <tr *ngIf="!isLoading && errorMessage">
                <td colspan="5" class="py-12 text-center text-rose-500 text-sm font-medium">
                    {{ errorMessage }}
                </td>
            </tr>

            <tr app-applicants-card *ngFor="let item of registrations; let i = index; trackBy: trackByApplicantId"
                [applicant]="item"
                [index]="i"
                class="border-b border-slate-100 hover:bg-blue-50/40 transition-colors duration-200">
            </tr>

            <tr *ngIf="!isLoading && !errorMessage && registrations.length === 0">
                <td colspan="5" class="py-24 text-center">
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-14 h-14 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400">
                            <span class="material-symbols-outlined text-3xl">inbox</span>
                        </div>
                        <p class="text-lg font-bold text-blue-950">No records found.</p>
                        <p class="text-sm text-slate-400 font-medium">You have no registration records at this time.</p>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<p class="mt-4 text-[11px] text-gray-500 px-2">
    <span class="text-blue-500 font-bold">Note:</span> If your status is <span
        class="text-amber-600 font-semibold">pending</span>, please wait for the admissions office to review your
    documents.
</p>
