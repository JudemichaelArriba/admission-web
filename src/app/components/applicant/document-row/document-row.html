<td class="px-5 py-4 text-sm font-medium text-slate-600">{{ doc.id }}</td>
<td class="px-5 py-4 text-sm text-slate-600">{{ doc.typeLabel }}</td>

<td class="px-5 py-4 text-sm text-slate-600">
    <button type="button" class="text-blue-600 font-semibold hover:underline disabled:text-slate-400"
        [disabled]="!doc.canOpen" (click)="open.emit(doc)">
        {{ doc.filename }}
    </button>


    <div class="text-[11px] text-slate-400 mt-1">
        {{ doc.mimeLabel }} • {{ doc.sizeLabel }}
    </div>
</td>

<td class="px-5 py-4 text-sm text-slate-600">
    {{ doc.createdAt ? (doc.createdAt | date:'mediumDate') : '—' }}
</td>

<td class="px-5 py-4 text-center">
    <span [ngClass]="{
      'bg-amber-50 text-amber-600 border-amber-100': doc.scanStatus === 'pending',
      'bg-emerald-50 text-emerald-600 border-emerald-100': doc.scanStatus === 'clean',
      'bg-rose-50 text-rose-600 border-rose-100': doc.scanStatus === 'infected'
    }" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider border">
        {{ doc.scanStatus }}
    </span>
</td>
