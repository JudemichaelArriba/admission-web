<div class="overflow-x-auto bg-white rounded-[2rem] border border-slate-200 shadow-sm">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-50 border-b-2 border-blue-600">
                <th class="px-5 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">No.</th>
                <th class="px-5 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">Exam Date</th>
                <th class="px-5 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">End Time</th>
                <th class="px-5 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest">Room</th>
                <th class="px-5 py-4 text-[11px] font-bold text-slate-500 uppercase tracking-widest text-center">Status
                </th>
            </tr>
        </thead>
        <tbody>
            <tr *ngIf="isLoading">
                <td colspan="5" class="py-12 text-center">
                    <span
                        class="inline-block h-6 w-6 rounded-full border-2 border-slate-300 border-t-blue-600 animate-spin"></span>
                </td>
            </tr>

            <tr *ngIf="!isLoading && errorMessage">
                <td colspan="5" class="py-12 text-center text-rose-500 text-sm font-medium">
                    {{ errorMessage }}
                </td>
            </tr>

            <tr app-exam-row *ngFor="let item of exams; let i = index; trackBy: trackByExamId" [exam]="item" [index]="i"
                class="border-b border-slate-100 hover:bg-blue-50/40 transition-colors duration-200">
            </tr>

            <tr *ngIf="!isLoading && !errorMessage && exams.length === 0">
                <td colspan="5" class="py-24 text-center">
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-14 h-14 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400">
                            <span class="material-symbols-outlined text-3xl">event_busy</span>
                        </div>
                        <p class="text-lg font-bold text-blue-950">No schedule found.</p>
                        <p class="text-sm text-slate-400 font-medium">You have no exam schedule at this time.</p>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
