<div class="relative z-20 max-w-7xl mx-auto px-8 -mt-10">
    <div
        class="bg-white border border-slate-200 shadow-[0_8px_40px_-12px_rgba(30,58,138,0.15)] rounded-[2rem] p-2 flex items-center justify-between">


        <div class="flex items-center space-x-1">

            <button (click)="setTab('status')" [class]="activeTab === 'status'
                    ? 'bg-blue-600 text-white shadow-md'
                    : 'text-slate-500 hover:bg-slate-50 hover:text-blue-600'"
                class="flex items-center gap-2 px-5 py-2.5 text-sm font-bold rounded-[1.25rem] transition-all duration-300">
                <span class="material-symbols-outlined text-[18px]">task_alt</span>
                Registration
            </button>

            <button (click)="setTab('schedule')" [class]="activeTab === 'schedule'
                    ? 'bg-blue-600 text-white shadow-md'
                    : 'text-slate-500 hover:bg-slate-50 hover:text-blue-600'"
                class="flex items-center gap-2 px-5 py-2.5 text-sm font-bold rounded-[1.25rem] transition-all duration-300">
                <span class="material-symbols-outlined text-[18px]">calendar_month</span>
                Schedule
            </button>

            <button (click)="setTab('documents')" [class]="activeTab === 'documents'
                    ? 'bg-blue-600 text-white shadow-md'
                    : 'text-slate-500 hover:bg-slate-50 hover:text-blue-600'"
                class="flex items-center gap-2 px-5 py-2.5 text-sm font-bold rounded-[1.25rem] transition-all duration-300">
                <span class="material-symbols-outlined text-[18px]">folder_open</span>
                Documents
            </button>

            <button (click)="setTab('info')" [class]="activeTab === 'info'
                    ? 'bg-blue-600 text-white shadow-md'
                    : 'text-slate-500 hover:bg-slate-50 hover:text-blue-600'"
                class="flex items-center gap-2 px-5 py-2.5 text-sm font-bold rounded-[1.25rem] transition-all duration-300">
                <span class="material-symbols-outlined text-[18px]">manage_accounts</span>
                My Info
            </button>

        </div>


        <div class="flex items-center gap-3 pr-2">

            <div class="w-px h-6 bg-slate-200"></div>

            <button (click)="logout()"
                class="flex items-center gap-2 px-4 py-2.5 text-sm font-bold text-slate-500 hover:text-rose-500 hover:bg-rose-50 rounded-[1.25rem] transition-all duration-300">
                <span class="material-symbols-outlined text-[18px]">logout</span>
                Logout
            </button>

        </div>
    </div>
</div>
