<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4 animate-in fade-in duration-300"
    [ngClass]="{'animate-out fade-out duration-300': isClosing}">

    <div class="bg-slate-900 border border-white/[0.08] rounded-[2rem] shadow-2xl shadow-black/50 w-full max-w-md overflow-hidden animate-in zoom-in-95 duration-200 relative"
        [ngClass]="{'animate-out zoom-out-95 duration-300': isClosing}">

        <span
            class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-blue-500/40 to-transparent"></span>

        <div class="px-8 py-6 border-b border-white/[0.05] flex justify-between items-center bg-white/[0.02]">
            <h3 class="text-xl font-bold text-slate-100 tracking-tight">Upload Document</h3>
            <button (click)="close()"
                class="w-8 h-8 flex items-center justify-center rounded-full text-slate-500 hover:text-slate-200 hover:bg-white/10 transition-all">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>

        <form [formGroup]="form" (ngSubmit)="onUpload()" class="p-8 space-y-6">
            <div class="relative">
                <app-dropdown label="Document Type" placeholder="Select document type" [options]="dropdownOptions"
                    [selectedValue]="form.value.document_type" (selectionChange)="onTypeChange($event)">
                </app-dropdown>

                @if (form.get('document_type')?.touched && form.get('document_type')?.invalid) {
                <p
                    class="text-rose-400 text-[10px] mt-2 pl-1 font-medium italic uppercase tracking-wider animate-pulse">
                    Please select a type
                </p>
                }
            </div>

            <div class="space-y-2">
                <label class="block text-[9px] font-semibold text-slate-500 uppercase tracking-[0.18em] pl-1 font-mono">
                    Select File
                </label>

                <div class="relative group">
                    <input type="file" (change)="onFileSelected($event)" accept=".pdf,.jpg,.jpeg,.png" class="block w-full text-xs text-slate-400
                        file:mr-4 file:py-2.5 file:px-4
                        file:rounded-xl file:border-0
                        file:text-xs file:font-bold
                        file:bg-blue-500/10 file:text-blue-400
                        hover:file:bg-blue-500/20 file:transition-all
                        cursor-pointer bg-white/[0.03] border border-white/[0.08] rounded-2xl p-2
                        group-hover:border-blue-500/30 transition-colors" />
                </div>

                <p *ngIf="fileError" class="text-rose-400 text-[10px] mt-1 font-medium italic">{{ fileError }}</p>
            </div>

            <div class="flex gap-3 pt-4">
                <button type="button" (click)="close()"
                    class="flex-1 px-6 py-3.5 rounded-2xl text-sm font-bold text-slate-400 bg-white/[0.05] hover:bg-white/[0.1] hover:text-slate-200 transition-all border border-white/[0.05]">
                    Cancel
                </button>

                <button type="submit" [disabled]="isUploading || !selectedFile || form.invalid"
                    class="flex-1 px-6 py-3.5 rounded-2xl text-sm font-bold text-white 
                    bg-blue-600 hover:bg-blue-500 disabled:opacity-30 disabled:grayscale 
                    shadow-lg shadow-blue-900/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span *ngIf="isUploading"
                        class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                    {{ isUploading ? 'Uploading...' : 'Upload Now' }}
                </button>
            </div>
        </form>
    </div>
</div>
