<td class="px-5 py-4 text-sm font-medium text-slate-600">{{ exam.id }}</td>

<td class="px-5 py-4 text-sm text-slate-600">
    {{ exam.examDate ? (exam.examDate | date:'MMM d, y, h:mm a') : '—' }}
</td>

<td class="px-5 py-4 text-sm text-slate-600">
    {{ exam.examEndTime ? (exam.examEndTime | date:'h:mm a') : '—' }}
</td>

<td class="px-5 py-4 text-sm text-slate-600">{{ exam.room || '—' }}</td>

<td class="px-5 py-4 text-center flex items-center justify-center gap-3">
    <span [ngClass]="{
      'bg-blue-50 text-blue-600 border-blue-100': exam.status === 'scheduled',
      'bg-emerald-50 text-emerald-600 border-emerald-100': exam.status === 'evaluated',
      'bg-amber-50 text-amber-600 border-amber-100': exam.status === 'completed'
    }" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider border">
        {{ exam.status || 'scheduled' }}
    </span>

    @if (exam.status === 'evaluated') {
        <span class="material-symbols-outlined text-[16px] text-slate-400">open_in_new</span>
    }
</td>
