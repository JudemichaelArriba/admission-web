<div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-md transition-opacity" (click)="close.emit()"></div>

  <div class="relative w-full max-w-sm bg-white rounded-2xl shadow-[0_32px_64px_-12px_rgba(0,0,0,0.18)] border border-slate-200/80 overflow-hidden animate-in zoom-in-95 duration-200">

    
    <div class="px-6 pt-6 pb-5 flex items-start justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center shadow-sm shrink-0">
          <span class="material-symbols-outlined text-white text-[18px]">workspace_premium</span>
        </div>
        <div>
          <h2 class="text-sm font-bold text-slate-900 tracking-tight leading-none">Exam Result</h2>
          <p class="text-[10px] font-semibold text-slate-400 mt-1 tracking-widest uppercase">Ref #{{ exam.id }}</p>
        </div>
      </div>
      <button
        (click)="close.emit()"
        class="w-7 h-7 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors -mt-0.5"
      >
        <span class="material-symbols-outlined text-[16px]">close</span>
      </button>
    </div>

    <div class="mx-6 mb-5 rounded-xl bg-gradient-to-br from-blue-600 to-blue-700 p-6 flex flex-col items-center text-center shadow-lg shadow-blue-200">
      <p class="text-[9px] font-bold text-blue-200 uppercase tracking-[0.18em] mb-4">Final Score</p>
      <span class="text-5xl font-black text-white leading-none tracking-tight">
        {{ exam.examScore | number:'1.2-2' }}
      </span>
      <div class="mt-3 h-px w-10 bg-blue-400/50 rounded-full"></div>
      <p class="mt-2 text-[10px] font-semibold text-blue-300 tracking-wide">Overall Performance</p>
    </div>


    <div class="px-6 pb-6 space-y-3">
      <div class="flex justify-between items-center py-3 border-b border-slate-100">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-slate-400 text-[15px]">calendar_today</span>
          <span class="text-xs font-semibold text-slate-500">Date</span>
        </div>
        <span class="text-xs font-bold text-slate-800">{{ exam.examDate | date:'MMM d, y' }}</span>
      </div>

      <div class="flex justify-between items-center py-3 border-b border-slate-100">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-slate-400 text-[15px]">meeting_room</span>
          <span class="text-xs font-semibold text-slate-500">Room</span>
        </div>
        <span class="text-xs font-bold text-slate-800">{{ exam.room }}</span>
      </div>
    </div>

    <div class="px-6 pb-6">
      <button
        (click)="close.emit()"
        class="w-full py-3 rounded-xl text-[11px] font-bold uppercase tracking-widest text-white bg-blue-600 hover:bg-blue-700 active:scale-[0.98] transition-all duration-150 shadow-sm"
      >
        Close
      </button>
    </div>

  </div>
</div>
