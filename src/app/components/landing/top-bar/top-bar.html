<nav [ngClass]="isScrolled ? 'bg-white/70 shadow-md' : 'bg-white/95 shadow-sm'"
    class="fixed top-0 w-full z-50 backdrop-blur-lg border-b border-gray-100 transition-colors duration-300">
    <div class="flex justify-between items-center w-full px-8 max-w-7xl mx-auto h-16">


        <div class="flex items-center gap-3">
            <div
                class="w-9 h-9 rounded-xl flex items-center justify-center shadow-md shadow-blue-200/60 shrink-0 bg-gradient-to-br from-blue-600 to-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                </svg>
            </div>
            <div>
                <h1 class="text-sm font-extrabold tracking-tight text-gray-900 leading-none">Admission</h1>
                <p class="text-[8.5px] font-semibold uppercase tracking-widest text-blue-600/70 mt-0.5">Academic Portal
                </p>
            </div>
        </div>


        <div class="hidden md:flex items-center gap-1">
            <a [routerLink]="['/']" fragment="home" (click)="setActive('home')"
                [attr.aria-current]="activeSection === 'home' ? 'page' : null"
                [ngClass]="activeSection === 'home' ? 'text-blue-700' : 'text-gray-600'" class="relative flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold
        hover:bg-gradient-to-r hover:from-gray-50 hover:to-gray-100/50
        hover:text-blue-700 transition-all group focus-visible:outline-none focus-visible:ring-2
        focus-visible:ring-blue-400/60 focus-visible:ring-offset-2 focus-visible:ring-offset-white">
                Home
            </a>

            <a [routerLink]="['/']" fragment="courses" (click)="setActive('courses')"
                [attr.aria-current]="activeSection === 'courses' ? 'page' : null"
                [ngClass]="activeSection === 'courses' ? 'text-blue-700' : 'text-gray-600'" class="relative flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold
        hover:bg-gradient-to-r hover:from-gray-50 hover:to-gray-100/50
        hover:text-blue-700 transition-all group focus-visible:outline-none focus-visible:ring-2
        focus-visible:ring-blue-400/60 focus-visible:ring-offset-2 focus-visible:ring-offset-white">
                Courses
            </a>

            <a [routerLink]="['/']" fragment="features" (click)="setActive('features')"
                [attr.aria-current]="activeSection === 'features' ? 'page' : null"
                [ngClass]="activeSection === 'features' ? 'text-blue-700' : 'text-gray-600'" class="relative flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold
        hover:bg-gradient-to-r hover:from-gray-50 hover:to-gray-100/50
        hover:text-blue-700 transition-all group focus-visible:outline-none focus-visible:ring-2
        focus-visible:ring-blue-400/60 focus-visible:ring-offset-2 focus-visible:ring-offset-white">
                Features
            </a>

            <a [routerLink]="['/']" fragment="campus" (click)="setActive('campus')"
                [attr.aria-current]="activeSection === 'campus' ? 'page' : null"
                [ngClass]="activeSection === 'campus' ? 'text-blue-700' : 'text-gray-600'" class="relative flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold
        hover:bg-gradient-to-r hover:from-gray-50 hover:to-gray-100/50
        hover:text-blue-700 transition-all group focus-visible:outline-none focus-visible:ring-2
        focus-visible:ring-blue-400/60 focus-visible:ring-offset-2 focus-visible:ring-offset-white">
                Campus
            </a>



            <a [routerLink]="['/']" fragment="apply" (click)="setActive('apply')"
                [attr.aria-current]="activeSection === 'apply' ? 'page' : null"
                [ngClass]="activeSection === 'apply' ? 'text-blue-700' : 'text-gray-600'" class="relative flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold
        hover:bg-gradient-to-r hover:from-gray-50 hover:to-gray-100/50
        hover:text-blue-700 transition-all group focus-visible:outline-none focus-visible:ring-2
        focus-visible:ring-blue-400/60 focus-visible:ring-offset-2 focus-visible:ring-offset-white">
                Apply
            </a>
        </div>


        <div class="flex items-center gap-2">
            <a [routerLink]="['/login']"
                class="flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold
    text-blue-700 border border-blue-100 hover:bg-gradient-to-r hover:from-blue-50 hover:to-blue-100/50
    hover:border-blue-300 hover:text-blue-800 transition-all duration-200 focus-visible:outline-none
    focus-visible:ring-2 focus-visible:ring-blue-400/60 focus-visible:ring-offset-2 focus-visible:ring-offset-white cursor-pointer">
                Login
            </a>
            <a [routerLink]="['/register']" fragment="apply" class="flex items-center gap-1.5 px-5 py-2.5 rounded-lg text-sm font-bold text-white
        bg-gradient-to-br from-blue-600 to-blue-500 shadow-md shadow-blue-200/50
        hover:shadow-lg hover:shadow-blue-300/50 hover:-translate-y-px
        active:scale-95 transition-all duration-200 focus-visible:outline-none focus-visible:ring-2
        focus-visible:ring-blue-400/60 focus-visible:ring-offset-2 focus-visible:ring-offset-white">
                Apply Now
            </a>
        </div>

    </div>
</nav>
