<div class="flex flex-col min-h-screen bg-[#f4f7fa] p-4 md:p-6 lg:p-8 gap-6">

  <header class="bg-white rounded-[2rem] border border-slate-100 shadow-xl shadow-slate-200/50 relative overflow-hidden">
    <div class="absolute inset-0 opacity-[0.03] pointer-events-none"
      style="background-image: radial-gradient(#2563eb 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>

    <div class="max-w-7xl mx-auto px-8 md:px-12 py-10 flex flex-col lg:flex-row lg:items-end justify-between gap-6 relative z-10">
      <div>
        <div class="flex items-center gap-2 mb-2">
          <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-blue-50 text-blue-600 uppercase tracking-widest">Administrative Portal</span>
        </div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight leading-none">Exam Evaluation</h1>
        <p class="text-slate-500 text-sm mt-2 max-w-lg font-medium">
          Grade applicants who have completed their entrance exams.
        </p>
      </div>

      <div class="flex items-center gap-4 bg-slate-50 px-5 py-3 rounded-2xl border border-slate-100">
        <div class="flex flex-col">
          <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pending Grades</span>
          <span class="text-lg font-black text-blue-600 leading-none mt-1">{{ pendingCount() }}</span>
        </div>
        <div class="w-px h-8 bg-slate-200"></div>
        <div class="flex flex-col">
          <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Evaluated</span>
          <span class="text-lg font-black text-slate-700 leading-none mt-1">{{ evaluatedCount() }}</span>
        </div>
      </div>
    </div>
  </header>

  <div class="max-w-7xl w-full mx-auto bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-lg shadow-slate-200/40">
    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
      
      <div class="relative w-full md:max-w-md">
        <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">search</span>
        <input
          type="text"
          [ngModel]="searchTerm()"
          (ngModelChange)="updateSearch($event)"
          placeholder="Search by applicant name, ID, or room..."
          class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-transparent rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 font-medium" />
      </div>

      <div class="flex items-center gap-2 w-full md:w-auto overflow-x-auto">
        <div class="flex gap-1 bg-slate-100 p-1 rounded-xl shrink-0">
          <button (click)="setFilter('all')" [class]="activeFilter() === 'all' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'" class="px-5 py-2 text-xs font-bold rounded-lg transition-all">All Records</button>
          <button (click)="setFilter('ungraded')" [class]="activeFilter() === 'ungraded' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'" class="px-5 py-2 text-xs font-bold rounded-lg transition-all">Pending Grades</button>
          <button (click)="setFilter('graded')" [class]="activeFilter() === 'graded' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'" class="px-5 py-2 text-xs font-bold rounded-lg transition-all">Evaluated</button>
        </div>
      </div>

    </div>
  </div>

  <section class="max-w-7xl w-full mx-auto flex-grow pb-10">
    <div class="bg-white rounded-[2rem] border border-slate-200/60 shadow-xl shadow-slate-200/30 overflow-hidden">
      
      <app-exam-table 
        [exams]="paginatedExams()" 
        [isLoading]="isLoading()"
        (actionClick)="handleAction($event)">
      </app-exam-table>

      <div class="bg-slate-50/50 border-t border-slate-100 px-8 py-5 flex items-center justify-between">
        <p class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">
          Total Matches <span class="text-slate-900 mx-1">{{ filteredExams().length }}</span>
        </p>
        
        <div class="flex gap-2 items-center">
          <button 
            (click)="prevPage()" 
            [disabled]="currentPage() === 1 || isLoading()"
            class="px-4 py-2 rounded-xl text-xs font-bold text-slate-500 border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
            Previous
          </button>
          
          <div class="px-4 py-2 rounded-xl text-xs font-bold bg-blue-600 text-white shadow-md shadow-blue-100 min-w-[3rem] text-center">
            {{ currentPage() }} / {{ totalPages() }}
          </div>
          
          <button 
            (click)="nextPage()" 
            [disabled]="currentPage() === totalPages() || isLoading()"
            class="px-4 py-2 rounded-xl text-xs font-bold text-slate-600 border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
            Next
          </button>
        </div>

      </div>

    </div>
  </section>

</div>

@if (selectedExamForEvaluation()) {
  <app-exam-evaluate-modal
    [exam]="selectedExamForEvaluation()!"
    (close)="selectedExamForEvaluation.set(null)"
    (saved)="handleExamEvaluated($event)">
  </app-exam-evaluate-modal>
}
