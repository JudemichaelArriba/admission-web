<div class="flex flex-col min-h-screen bg-[#f4f7fa] p-4 md:p-6 lg:p-8 gap-6">

  <header class="bg-white rounded-[2rem] border border-slate-100 shadow-xl shadow-slate-200/50 relative overflow-hidden">
    <div class="absolute inset-0 opacity-[0.03] pointer-events-none"
      style="background-image: radial-gradient(#2563eb 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>

    <div class="max-w-7xl mx-auto px-8 md:px-12 py-10 flex flex-col lg:flex-row lg:items-end justify-between gap-6 relative z-10">
      <div>
        <div class="flex items-center gap-2 mb-2">
          <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-blue-50 text-blue-600 uppercase tracking-widest">Administrative Portal</span>
        </div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight leading-none">Applicant Registry</h1>
        <p class="text-slate-500 text-sm mt-2 max-w-lg font-medium">
          Students Applications <span class="text-blue-600">Aces Tagum Inc.</span>
        </p>
      </div>
    </div>
  </header>

  <div class="max-w-7xl w-full mx-auto bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-lg shadow-slate-200/40">
    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
      <div class="relative w-full md:max-w-md">
        <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">search</span>
        <input
          type="text"
          [ngModel]="searchTerm()"
          (ngModelChange)="searchTerm.set($event)"
          placeholder="Search applicants by name or ID..."
          class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-transparent rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 font-medium" />
      </div>

      <div class="flex items-center gap-2 w-full md:w-auto overflow-x-auto">
        <div class="flex gap-1 bg-slate-100 p-1 rounded-xl shrink-0">
          <button
            (click)="setFilter('all')"
            [class]="activeFilter() === 'all' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
            class="px-5 py-2 text-xs font-bold rounded-lg transition-all">All</button>

          <button
            (click)="setFilter('pending')"
            [class]="activeFilter() === 'pending' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
            class="px-5 py-2 text-xs font-bold rounded-lg transition-all">Pending</button>

          <button
            (click)="setFilter('approved')"
            [class]="activeFilter() === 'approved' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
            class="px-5 py-2 text-xs font-bold rounded-lg transition-all">Approved</button>
        </div>
      </div>
    </div>
  </div>

  <section class="max-w-7xl w-full mx-auto flex-grow pb-10">
    <div class="bg-white rounded-[2rem] border border-slate-200/60 shadow-xl shadow-slate-200/30 overflow-hidden">

      @if (isLoading()) {
        <div class="flex flex-col items-center justify-center py-20 gap-4">
          <div class="w-10 h-10 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin"></div>
          <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Fetching Records...</p>
        </div>
      } @else {
        <app-applicants-table
          [data]="filteredApplicants()"
          [processingId]="processingId()"
          [processingAction]="processingAction()"
          (approveClicked)="onApprove($event)"
          (rejectClicked)="onReject($event)"
          (rowClicked)="openApplicantDetails($event)">
        </app-applicants-table>
      }

      <div class="bg-slate-50/50 border-t border-slate-100 px-8 py-5 flex items-center justify-between">
        <p class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">
          Matches <span class="text-slate-900 mx-1">{{ filteredApplicants().length }}</span>
        </p>
        <div class="flex gap-2">
          <button class="px-4 py-2 rounded-xl text-xs font-bold text-slate-400 border border-slate-200 bg-white">Previous</button>
          <button class="px-4 py-2 rounded-xl text-xs font-bold bg-blue-600 text-white shadow-md shadow-blue-100">1</button>
          <button class="px-4 py-2 rounded-xl text-xs font-bold text-slate-600 border border-slate-200 bg-white hover:bg-slate-50">Next</button>
        </div>
      </div>
    </div>
  </section>

</div>

@if (isModalOpen() && selectedApplicant()) {
  <app-applicants-details-modal
    [applicant]="selectedApplicant()!"
    (closeModal)="closeModal()">
  </app-applicants-details-modal>
}
