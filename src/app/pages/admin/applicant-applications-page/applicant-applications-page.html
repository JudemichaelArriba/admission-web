<div class="flex flex-col min-h-screen bg-slate-50 p-4 md:p-6 lg:p-8 gap-6 font-sans">

  <header class="relative overflow-hidden bg-white/70 backdrop-blur-xl rounded-[2.5rem] border border-white/50 shadow-2xl shadow-blue-200/40">
    <div class="absolute inset-0 opacity-[0.05] pointer-events-none"
      style="background-image: radial-gradient(#2563eb 0.8px, transparent 0.8px); background-size: 20px 20px;"></div>
    <div class="absolute -top-24 -right-24 w-64 h-64 bg-blue-400/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-blue-600/5 rounded-full blur-3xl"></div>

    <div class="max-w-7xl mx-auto px-8 md:px-12 py-12 flex flex-col lg:flex-row lg:items-center justify-between gap-6 relative z-10">
      <div>
        <div class="flex items-center gap-2 mb-3">
          <span class="px-3 py-1 rounded-full text-[10px] font-black bg-blue-600 text-white uppercase tracking-[0.2em] shadow-lg shadow-blue-200">Administrative Portal</span>
        </div>
        <h1 class="text-4xl font-black text-slate-900 tracking-tight leading-none">
          Applicant <span class="text-blue-600">Registry</span>
        </h1>
        <p class="text-slate-500 text-sm mt-3 max-w-lg font-medium flex items-center gap-2">
         
          Students Applications Registry for Aces Tagum Inc.
        </p>
      </div>
    </div>
  </header>

  <div class="max-w-7xl w-full mx-auto bg-white/80 backdrop-blur-md p-3 rounded-2xl border border-white/60 shadow-lg shadow-blue-100/50">
    <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
      <div class="relative w-full md:max-w-md group">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-blue-500 group-focus-within:text-blue-600 transition-colors">search</span>
        <input
          type="text"
          [ngModel]="searchTerm()"
          (ngModelChange)="updateSearch($event)"
          placeholder="Search applicants by name or ID..."
          class="w-full pl-12 pr-4 py-3.5 bg-white border border-slate-100 rounded-xl text-sm focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 font-medium shadow-sm" />
      </div>

      <div class="flex items-center gap-2 w-full md:w-auto">
        <div class="flex gap-1 bg-slate-100/50 p-1.5 rounded-xl border border-slate-200/50 w-full md:w-auto">
          <button
            (click)="setFilter('all')"
            [class]="activeFilter() === 'all' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-500 hover:bg-white/50 hover:text-blue-600'"
            class="flex-1 md:flex-none px-6 py-2.5 text-xs font-black rounded-lg transition-all uppercase tracking-wider">All</button>

          <button
            (click)="setFilter('pending')"
            [class]="activeFilter() === 'pending' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-500 hover:bg-white/50 hover:text-blue-600'"
            class="flex-1 md:flex-none px-6 py-2.5 text-xs font-black rounded-lg transition-all uppercase tracking-wider">Pending</button>

          <button
            (click)="setFilter('approved')"
            [class]="activeFilter() === 'approved' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'text-slate-500 hover:bg-white/50 hover:text-blue-600'"
            class="flex-1 md:flex-none px-6 py-2.5 text-xs font-black rounded-lg transition-all uppercase tracking-wider">Approved</button>
        </div>
      </div>
    </div>
  </div>

  <section class="max-w-7xl w-full mx-auto flex-grow pb-10">
    <div class="bg-white rounded-[2.5rem] border border-white shadow-2xl shadow-blue-100/60 overflow-hidden flex flex-col h-full">

      @if (isLoading()) {
        <div class="flex flex-col items-center justify-center py-32 gap-6">
          <div class="relative">
            <div class="w-16 h-16 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-2 h-2 bg-blue-600 rounded-full animate-ping"></div>
            </div>
          </div>
          <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.3em]">Synchronizing Records</p>
        </div>
      } @else {
        <div class="flex-grow overflow-auto">
          <app-applicants-table
            [data]="paginatedApplicants()"
            [processingId]="processingId()"
            [processingAction]="processingAction()"
            (approveClicked)="onApprove($event)"
            (rejectClicked)="onReject($event)"
            (rowClicked)="openApplicantDetails($event)">
          </app-applicants-table>
        </div>
      }

      <div class="bg-slate-50/80 backdrop-blur-md border-t border-slate-100 px-10 py-6 flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <span class="p-2 bg-blue-100 rounded-lg">
             <span class="material-symbols-outlined text-blue-600 text-sm">database</span>
          </span>
          <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">
            Registry Count <span class="text-blue-600 ml-1 text-sm">{{ totalRecords() }}</span>
          </p>
        </div>
        
        <div class="flex gap-3 items-center">
          <button 
            (click)="prevPage()" 
            [disabled]="currentPage() === 1 || isLoading()"
            class="group flex items-center gap-2 px-5 py-2.5 rounded-xl text-xs font-black text-slate-600 border border-slate-200 bg-white hover:border-blue-400 hover:text-blue-600 disabled:opacity-30 disabled:hover:border-slate-200 disabled:hover:text-slate-600 transition-all shadow-sm">
            <span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-1">chevron_left</span>
            Prev
          </button>
          
          <div class="px-6 py-2.5 rounded-xl text-xs font-black bg-blue-600 text-white shadow-xl shadow-blue-200 min-w-[4rem] text-center tracking-tighter">
            {{ currentPage() }} <span class="opacity-50 mx-1">/</span> {{ totalPages() || 1 }}
          </div>
          
          <button 
            (click)="nextPage()" 
            [disabled]="currentPage() === totalPages() || totalPages() === 0 || isLoading()"
            class="group flex items-center gap-2 px-5 py-2.5 rounded-xl text-xs font-black text-slate-600 border border-slate-200 bg-white hover:border-blue-400 hover:text-blue-600 disabled:opacity-30 disabled:hover:border-slate-200 disabled:hover:text-slate-600 transition-all shadow-sm">
            Next
            <span class="material-symbols-outlined text-sm transition-transform group-hover:translate-x-1">chevron_right</span>
          </button>
        </div>
      </div>
    </div>
  </section>

</div>

@if (isModalOpen() && selectedApplicant()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-blue-900/20 backdrop-blur-sm p-4">
    <app-applicants-details-modal
      class="w-full max-w-4xl animate-in fade-in zoom-in duration-300"
      [applicant]="selectedApplicant()!"
      (closeModal)="closeModal()"
      (applicantUpdated)="handleApplicantUpdate($event)">
    </app-applicants-details-modal>
  </div>
}
