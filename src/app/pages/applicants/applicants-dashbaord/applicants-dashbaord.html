<div class="min-h-screen bg-slate-50">

    <app-applicants-tabs [activeTab]="activeTab" (tabChange)="activeTab = $event">

    <main class="max-w-7xl mx-auto px-8 py-10">

            <app-status-table></app-status-table>

        <div *ngIf="activeTab === 'documents'" class="py-24 text-center">
        </div>

    </main>
</div>
