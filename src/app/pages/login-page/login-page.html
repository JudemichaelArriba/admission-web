<section class="relative h-screen w-full flex items-center justify-center overflow-hidden bg-gray-900">
    <div class="absolute inset-0 z-0">
        <img alt="Student on campus" class="w-full h-full object-cover" src="aces-front.png" />
        <div
            class="absolute inset-0 bg-gradient-to-br from-blue-900/80 via-blue-950/70 to-black/80 backdrop-blur-[2px]">
        </div>
    </div>

    <div class="relative z-10 w-full max-w-sm px-6">
        <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl p-6">

            <div class="text-center mb-6">
                <h2 class="text-2xl font-extrabold text-white tracking-tight">
                    Admission <span class="text-blue-400">Portal</span>
                </h2>
                <p class="text-gray-300 mt-1 text-xs uppercase tracking-wider">Aces Tagum College Inc.</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-200 mb-1.5 ml-1">Email</label>
                    <div class="relative">
                        <input type="email" formControlName="email" placeholder="Enter your Email"
                            class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-sm text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-200 mb-1.5 ml-1">Password</label>
                    <input type="password" formControlName="password" placeholder="••••••••"
                        class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-sm text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
                </div>

                <div class="flex justify-end">
                    <a href="#" class="text-[10px] text-blue-400 hover:text-blue-300 transition-colors">Forgot
                        password?</a>
                </div>

                <button type="submit" [disabled]="isLoading || loginForm.invalid"
                    class="w-full py-3 bg-gradient-to-r from-blue-600 to-blue-500 text-white text-sm font-bold rounded-xl shadow-lg shadow-blue-900/40 hover:shadow-blue-500/30 hover:-translate-y-0.5 active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    {{ isLoading ? 'Signing in...' : 'Sign In' }}
                </button>
            </form>

            <div class="mt-6 pt-5 border-t border-white/10 text-center">
                <p class="text-gray-400 text-xs">
                    Don't have an account?
                    <a routerLink="/register"
                        class="text-white font-semibold hover:text-blue-400 transition-colors ml-1 cursor-pointer">Apply
                        Now</a>
                </p>
            </div>
        </div>

        <p class="text-center mt-6 text-gray-400 text-[10px] tracking-wide">
            &copy; 2026 ACES TAGUM COLLEGE INC. | TECHNICAL SUPPORT
        </p>
    </div>

    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-blue-600/20 blur-[100px] -z-10">
    </div>
</section>
